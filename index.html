<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C; --gold-light: #E8C97A;
    --dark: #0D0D0D; --dark2: #161616; --dark3: #1F1F1F; --dark4: #2A2A2A;
    --text: #F0EDE6; --text-muted: #9A9186; --white: #FFFFFF; --radius: 4px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); font-size: 16px; line-height: 1.6; overflow-x: hidden; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 20px 48px; background: rgba(13,13,13,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,168,76,0.15); }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); letter-spacing: 0.04em; text-decoration: none; }
  .nav-logo span { color: var(--text); }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase; transition: color .2s; }
  .nav-links a:hover { color: var(--gold); }
  .nav-cta { background: var(--gold); color: var(--dark); padding: 10px 24px; border-radius: var(--radius); font-size: 14px; font-weight: 500; text-decoration: none; transition: background .2s; }
  .nav-cta:hover { background: var(--gold-light); }

  .hero { min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; padding: 120px 48px 80px; }
  .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 70% 50%, rgba(201,168,76,0.07) 0%, transparent 60%), linear-gradient(160deg, #0D0D0D 0%, #141210 100%); }
  .hero-lines { position: absolute; inset: 0; opacity: 0.04; background-image: repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(201,168,76,0.8) 79px, rgba(201,168,76,0.8) 80px); }
  .hero-content { position: relative; z-index: 1; max-width: 620px; }
  .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); border-radius: 100px; padding: 6px 16px; font-size: 12px; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 32px; }
  .hero-badge::before { content: \'\'; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(42px, 6vw, 72px); font-weight: 700; line-height: 1.1; color: var(--white); margin-bottom: 24px; }
  .hero h1 em { font-style: italic; color: var(--gold); }
  .hero p { font-size: 18px; color: var(--text-muted); font-weight: 300; line-height: 1.7; margin-bottom: 48px; max-width: 480px; }
  .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }
  .btn-primary { display: inline-flex; align-items: center; gap: 10px; background: var(--gold); color: var(--dark); padding: 16px 32px; border-radius: var(--radius); font-size: 15px; font-weight: 500; text-decoration: none; transition: background .2s, transform .15s; }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
  .btn-secondary { display: inline-flex; align-items: center; gap: 10px; border: 1px solid rgba(201,168,76,0.4); color: var(--gold); padding: 16px 32px; border-radius: var(--radius); font-size: 15px; text-decoration: none; transition: border-color .2s, background .2s; }
  .btn-secondary:hover { background: rgba(201,168,76,0.08); border-color: var(--gold); }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid rgba(201,168,76,0.1); border-bottom: 1px solid rgba(201,168,76,0.1); }
  .stat { padding: 40px 48px; border-right: 1px solid rgba(201,168,76,0.1); }
  .stat:last-child { border-right: none; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 48px; color: var(--gold); line-height: 1; margin-bottom: 8px; }
  .stat-label { font-size: 14px; color: var(--text-muted); letter-spacing: 0.04em; }

  section { padding: 100px 48px; }
  .section-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: clamp(32px, 4vw, 48px); font-weight: 700; color: var(--white); line-height: 1.15; margin-bottom: 20px; }
  .section-sub { font-size: 17px; color: var(--text-muted); font-weight: 300; max-width: 520px; line-height: 1.7; }

  .services { background: var(--dark2); }
  .services-header { margin-bottom: 64px; }
  .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2px; }
  .service-card { background: var(--dark3); padding: 48px 40px; position: relative; overflow: hidden; transition: background .2s; }
  .service-card:hover { background: var(--dark4); }
  .service-card::before { content: \'\'; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--gold), transparent); opacity: 0; transition: opacity .3s; }
  .service-card:hover::before { opacity: 1; }
  .service-icon { width: 52px; height: 52px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 28px; }
  .service-card h3 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--white); margin-bottom: 12px; }
  .service-card p { font-size: 15px; color: var(--text-muted); line-height: 1.7; }

  /* PRICING TABLE */
  .pricing-section { background: var(--dark2); }
  .pricing-header { margin-bottom: 48px; }
  .pricing-controls { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin-bottom: 32px; }
  .search-wrap { position: relative; flex: 1; min-width: 240px; max-width: 420px; }
  .search-wrap input { width: 100%; background: var(--dark3); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); color: var(--text); padding: 12px 16px 12px 44px; font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s; }
  .search-wrap input:focus { border-color: rgba(201,168,76,0.5); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; pointer-events: none; }
  .pax-filter { display: flex; gap: 8px; flex-wrap: wrap; }
  .pax-btn { background: var(--dark3); border: 1px solid rgba(255,255,255,0.08); color: var(--text-muted); padding: 8px 16px; border-radius: 100px; font-size: 13px; cursor: pointer; transition: all .2s; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
  .pax-btn:hover { border-color: rgba(201,168,76,0.4); color: var(--gold); }
  .pax-btn.active { background: rgba(201,168,76,0.12); border-color: var(--gold); color: var(--gold); }
  .results-count { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }

  .price-table-wrap { overflow-x: auto; border: 1px solid rgba(201,168,76,0.1); border-radius: 8px; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  thead th { background: rgba(201,168,76,0.08); padding: 14px 20px; text-align: left; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); font-weight: 500; border-bottom: 1px solid rgba(201,168,76,0.15); white-space: nowrap; }
  thead th:not(:first-child):not(:nth-child(2)) { text-align: center; }
  tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background .15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(201,168,76,0.04); }
  tbody td { padding: 13px 20px; font-size: 14px; color: var(--text-muted); }
  tbody td:first-child { color: var(--text); font-weight: 500; }
  tbody td:not(:first-child):not(:nth-child(2)) { text-align: center; color: var(--text); }
  tbody td:nth-child(2) { color: var(--text-muted); font-size: 13px; }
  .td-price-highlight { color: var(--gold) !important; font-weight: 500; }
  .maps-link { display: inline-flex; align-items: center; gap: 5px; color: var(--gold); text-decoration: none; font-size: 13px; opacity: 0.8; transition: opacity .2s; white-space: nowrap; }
  .maps-link:hover { opacity: 1; }
  .maps-link svg { flex-shrink: 0; }

    e.preventDefault();
    if (item.dataset.custom !== undefined) {
      var n = decodeURIComponent(item.dataset.custom);
      document.getElementById('fDestino').value = n;
      FDEST = {destino:n, km:'-', p1_4:'-', p5_6:'-', p6_8:'-', p9_12:'-', p13_16:'-'};
    } else {
      var n = decodeURIComponent(item.dataset.n);
      document.getElementById('fDestino').value = n;
      FDEST = null;
      for (var i=0; i<PRECIOS.length; i++) { if (PRECIOS[i].destino === n) { FDEST = PRECIOS[i]; break; } }
    }
    fdd.style.display = 'none';
    actualizarFormPrecio();
  });
});

/* ---- BOTONES PAX / HORARIO / EXTRAS ---- */
function selectPax(btn, pax) {
  document.querySelectorAll('.cot-pax-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  PAX = pax;
  mostrarPrecio();
}

function cotFechaChange() {
  var val = document.getElementById('cotFecha').value;
  if (!val) return;
  var h = new Date(val).getHours();
  var noc = (h >= 22 || h < 6);
  document.querySelectorAll('.cot-hor-btn').forEach(function(b){ b.classList.remove('active'); });
  var btns = document.querySelectorAll('.cot-hor-btn');
  if (noc) { HORA = 'nocturno'; if(btns[1]) btns[1].classList.add('active'); }
  else     { HORA = 'diurno';   if(btns[0]) btns[0].classList.add('active'); }
  mostrarPrecio();
}

function selectHorario(btn, h) {
  document.querySelectorAll('.cot-hor-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  HORA = h;
  mostrarPrecio();
}

function changeExtra(k, d) {
  EXT[k] = Math.max(0, EXT[k] + d);
  var ids = {maletas:'extMaletas', bicis:'extBicis', golf:'extGolf', sillas:'extSillas', alzador:'extAlzador'};
  var el = document.getElementById(ids[k]);
  if (el) el.textContent = EXT[k];
  mostrarPrecio();
}

function extTotal()  { return EXT.bicis * 6 + EXT.golf * 3.5; }
function extTexto() {
  var p=[];
  if(EXT.maletas) p.push(EXT.maletas+' maleta'+(EXT.maletas>1?'s':''));
  if(EXT.bicis)   p.push(EXT.bicis+' bici'+(EXT.bicis>1?'cletas':'cleta'));
  if(EXT.golf)    p.push(EXT.golf+' bolsa'+(EXT.golf>1?'s':'')+' golf');
  if(EXT.sillas)  p.push(EXT.sillas+' sillita'+(EXT.sillas>1?'s':''));
  if(EXT.alzador) p.push(EXT.alzador+' alzador'+(EXT.alzador>1?'es':''));
  return p.join(', ');
}

/* ---- MOSTRAR PRECIO ---- */
function mostrarPrecio() {
  var el = document.getElementById('cotResult');
  if (!el) return;
  var t = TR[lang] || TR.es;

  if (!DEST) {
    el.innerHTML = '<div class="cot-result-empty"><div class="cot-result-icon">🗺️</div><p>'+t.cot_empty+'</p></div>';
    return;
  }

  var raw = DEST[PAX];
  if (!raw || raw === '-') {
    var url = 'https://wa.me/34638110643?text='+encodeURIComponent(t.wa_budget + DEST.destino);
    el.innerHTML = '<div class="cot-result-empty"><div class="cot-result-icon">📞</div><p>'+t.cot_consult+'</p>'
      + '<a href="'+url+'" target="_blank" class="cot-wa-btn">'+WASVG+t.cot_budget_btn+'</a></div>';
    return;
  }

  var base  = parseInt(raw, 10);
  var pBase = (HORA === 'nocturno') ? Math.round(base * 1.15) : base;
  var extra = extTotal();
  var total = pBase + extra;
  var totalStr = total === Math.floor(total) ? total.toFixed(0) : total.toFixed(2).replace('.',',');
  var eTxt  = extTexto();
  var maps  = 'https://www.google.com/maps/search/' + encodeURIComponent(DEST.destino + ', Mallorca');
  var cotFechaVal = document.getElementById('cotFecha') ? document.getElementById('cotFecha').value : '';
  var waMsg = t.wa_reserve + DEST.destino + ' para ' + PAX_LBL[PAX];
  if (cotFechaVal) {
    var fd = new Date(cotFechaVal);
    var fechaStr = fd.toLocaleDateString('es-ES') + ' a las ' + fd.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    waMsg += '. Fecha: ' + fechaStr;
  }
  if (eTxt) waMsg += '. Extras: ' + eTxt;
  waMsg += '. Precio total: ' + totalStr + '€.' + t.wa_reserve2;

  el.innerHTML =
    '<div class="cot-result-card">'
    + '<div class="cot-result-destino">'
    +   '<a href="'+maps+'" target="_blank" class="cot-maps-link">'
    +     '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>'
    +     DEST.destino + ', Mallorca'
    +   '</a>'
    +   '<span class="cot-result-km">'+DEST.km+'</span>'
    + '</div>'
    + '<div class="cot-result-precio">'
    +   '<span class="cot-precio-num">'+totalStr+'€</span>'
    +   '<span class="cot-precio-label">'+t.cot_price_label+'</span>'
    +   (extra > 0 ? '<div style="font-size:13px;color:var(--gold);margin-top:4px;">+ '+(extra === Math.floor(extra) ? extra.toFixed(0) : extra.toFixed(2).replace('.',','))+'€ extras ('+eTxt+')</div>' : '')
    + '</div>'
    + '<div class="cot-result-meta">'
    +   '<span>'+PAX_LBL[PAX]+'</span><span>·</span><span>Ida sencilla</span><span>·</span><span>Precio fijo</span>'
    + '</div>'
    + '<a href="https://wa.me/34638110643?text='+encodeURIComponent(waMsg)+'" target="_blank" class="cot-wa-btn">'+WASVG+t.cot_book_btn+'</a>'
    + '<button onclick="pagarOnline()" id="cotPayBtn" class="cot-pay-btn visible">'
    +   '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>'
    +   ' Solicitar enlace de pago'
    + '</button>'
    + '</div>';
}

/* ---- FORMULARIO DESTINO ---- */
function formSearch() {
  var val = document.getElementById('fDestino').value;
  var q   = nrm(val.trim());
  var dd  = document.getElementById('formDropdown');
  if (!q) { dd.style.display='none'; dd.innerHTML=''; return; }
  var hits = PRECIOS.filter(function(r){ return nrm(r.destino).indexOf(q) !== -1; }).slice(0,10);
  var html = '';
  hits.forEach(function(r) {
    html += '<div class="cot-dd-item" data-n="'+encodeURIComponent(r.destino)+'"><span class="cot-dd-name">'+r.destino+'</span><span class="cot-dd-km">'+r.km+'</span></div>';
  });
  var exact = hits.some(function(r){ return nrm(r.destino) === q; });
  if (!exact && val.trim().length >= 2) {
    html += '<div class="cot-dd-item cot-dd-custom" data-custom="'+encodeURIComponent(val.trim())+'"><span class="cot-dd-name">✏️ Usar &quot;'+val.trim()+'&quot;</span><span class="cot-dd-km">solicitar precio</span></div>';
  }
  if (html) { dd.innerHTML = html; dd.style.display = 'block'; }
  else { dd.innerHTML = ''; dd.style.display = 'none'; }
}

function actualizarFormPrecio() {
  var box = document.getElementById('formPrecioBox');
  if (!box || !FDEST) { if(box) box.style.display='none'; return; }
  var pax = document.getElementById('fPax').value;
  var raw = FDEST[pax];
  if (!raw || raw === '-') { box.style.display='none'; return; }
  var base = parseInt(raw, 10);
  if (isNaN(base)) { box.style.display='none'; return; }
  var fecha = document.getElementById('fFecha').value, noc = false;
  if (fecha) { var h = new Date(fecha).getHours(); noc = h >= 22 || h < 6; }
  var precio = noc ? Math.round(base * 1.15) : base;
  document.getElementById('formPrecioNum').textContent = precio + '€';
  var meta = document.getElementById('formPrecioMeta');
  if (meta) meta.textContent = FDEST.destino + ' · ' + PAX_LBL[pax];
  box.style.display = 'flex';
}

/* ---- ENVIAR FORMULARIO ---- */
function handleSubmit(e) {
  e.preventDefault();
  var n     = document.getElementById('fNombre').value.trim();
  var c     = document.getElementById('fContacto').value.trim();
  var o     = document.getElementById('fOrigen').value;
  var d     = document.getElementById('fDestino').value.trim();
  var f     = document.getElementById('fFecha').value;
  var pSel  = document.getElementById('fPax');
  var pax   = pSel.options[pSel.selectedIndex].text;
  var notas = document.getElementById('fNotas').value.trim();
  var pEl   = document.getElementById('formPrecioNum');
  var pVal  = pEl ? pEl.textContent.trim() : '';
  var lines = ['Hola, quiero reservar un transfer.', ''];
  lines.push('*Nombre:* ' + n);
  lines.push('*Contacto:* ' + c);
  if (o)    lines.push('*Origen:* ' + o);
  if (d)    lines.push('*Destino:* ' + d);
  if (f)    lines.push('*Fecha/hora:* ' + f);
  lines.push('*Pasajeros:* ' + pax);
  if (pVal && pVal !== '0€') lines.push('*Precio:* ' + pVal);
  if (notas) lines.push('*Notas:* ' + notas);
  var a = document.createElement('a');
  a.href = 'https://wa.me/34638110643?text=' + encodeURIComponent(lines.join('\n'));
  a.target = '_blank'; a.rel = 'noopener noreferrer';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
